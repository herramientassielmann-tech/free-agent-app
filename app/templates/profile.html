{% extends "base.html" %}
{% block title %}Mi Perfil — Free Agent Academy{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Mi Perfil</h1>
    <p class="page-subtitle">Cuanto más completo esté tu perfil, más personalizados serán tus guiones.</p>
  </div>
</div>

{% if saved %}
<div class="alert alert-success">Perfil guardado correctamente.</div>
{% endif %}

<div class="card">
  <form method="POST" action="/profile">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="display_name">Nombre para tus guiones</label>
        <input
          class="form-input"
          type="text"
          id="display_name"
          name="display_name"
          placeholder="Ej: Carlos López"
          value="{{ profile.display_name if profile and profile.display_name else '' }}"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="market">Tu mercado / zona</label>
        <input
          class="form-input"
          type="text"
          id="market"
          name="market"
          placeholder="Ej: Madrid, Miami, Barcelona..."
          value="{{ profile.market if profile and profile.market else '' }}"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="tone">Tono de comunicación</label>
        <select class="form-input form-select" id="tone" name="tone">
          <option value="cercano" {% if not profile or profile.tone == 'cercano' %}selected{% endif %}>Cercano y natural</option>
          <option value="formal" {% if profile and profile.tone == 'formal' %}selected{% endif %}>Profesional y formal</option>
          <option value="energetico" {% if profile and profile.tone == 'energetico' %}selected{% endif %}>Energético y dinámico</option>
          <option value="inspiracional" {% if profile and profile.tone == 'inspiracional' %}selected{% endif %}>Inspiracional y motivador</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="specialization">Especialización</label>
        <select class="form-input form-select" id="specialization" name="specialization">
          <option value="todo_tipo" {% if not profile or profile.specialization == 'todo_tipo' %}selected{% endif %}>Todo tipo de propiedades</option>
          <option value="primera_vivienda" {% if profile and profile.specialization == 'primera_vivienda' %}selected{% endif %}>Primera vivienda</option>
          <option value="lujo" {% if profile and profile.specialization == 'lujo' %}selected{% endif %}>Propiedades de lujo</option>
          <option value="inversion" {% if profile and profile.specialization == 'inversion' %}selected{% endif %}>Inversión inmobiliaria</option>
          <option value="comercial" {% if profile and profile.specialization == 'comercial' %}selected{% endif %}>Inmuebles comerciales</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="speaking_notes">
        Notas sobre tu estilo
        <span class="form-hint">cómo hablas, muletillas, cosas que usas mucho…</span>
      </label>
      <textarea
        class="form-input form-textarea"
        id="speaking_notes"
        name="speaking_notes"
        placeholder='Ej: "Soy muy directo, uso mucho el humor, no me gustan los tecnicismos"'
        rows="3"
      >{{ profile.speaking_notes if profile and profile.speaking_notes else '' }}</textarea>
    </div>

    <div class="form-group">
      <label class="form-label" for="about_me">
        Sobre ti
        <span class="form-hint">contexto adicional para personalizar mejor los guiones</span>
      </label>
      <textarea
        class="form-input form-textarea"
        id="about_me"
        name="about_me"
        placeholder='Ej: "Llevo 10 años en el sector, me centro en familias que buscan su primer piso, mis clientes son de clase media"'
        rows="4"
      >{{ profile.about_me if profile and profile.about_me else '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar Perfil</button>
    </div>
  </form>
</div>
{% endblock %}
